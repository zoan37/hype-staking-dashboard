# fly.toml app configuration file generated for hype-staking-dashboard on 2026-05-16T17:26:14-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hype-staking-dashboard'
primary_region = 'iad'

[build]

[env]
  AUTO_REFRESH = '1'
  REFRESH_INTERVAL_S = '3600'

[[mounts]]
  source = 'staking_data'
  destination = '/app/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "10s"
    interval = "10s"
    method = "GET"
    timeout = "5s"
    path = "/api/health"

[deploy]
  strategy = "rolling"
  wait_timeout = "5m"

[[vm]]
  size = 'shared-cpu-1x'
  memory = '1gb'
