<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>PURR Holders — HYPE Dashboard</title>
<link rel="stylesheet" href="/static/style.css" />
</head>
<body>
<header>
  <div class="brand">
    <h1>HYPE <span>Staking</span> Dashboard</h1>
    <nav>
      <a href="/">Staking</a>
      <a href="/purr" class="active">PURR Holders</a>
    </nav>
  </div>
  <div style="display:flex; gap:14px; align-items:center;">
    <div class="meta" id="lastRefresh">—</div>
    <a class="ghlink" href="https://github.com/zoan37/hype-staking-dashboard" target="_blank" rel="noopener" title="View source on GitHub">
      <svg width="18" height="18" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
        <path d="M8 0C3.58 0 0 3.58 0 8a8 8 0 005.47 7.59c.4.07.55-.17.55-.38v-1.33c-2.23.48-2.7-1.07-2.7-1.07-.36-.93-.89-1.18-.89-1.18-.73-.5.06-.49.06-.49.81.06 1.23.83 1.23.83.72 1.23 1.88.88 2.34.67.07-.52.28-.88.51-1.08-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.13 0 0 .67-.21 2.2.82a7.65 7.65 0 014 0c1.53-1.04 2.2-.82 2.2-.82.44 1.11.16 1.93.08 2.13.51.56.82 1.27.82 2.15 0 3.07-1.87 3.74-3.65 3.94.29.25.54.73.54 1.48v2.19c0 .21.15.46.55.38A8 8 0 0016 8c0-4.42-3.58-8-8-8z"/>
      </svg>
    </a>
  </div>
</header>

<main>
  <div id="emptyState" class="empty" style="display:none;">
    Loading the latest PURR holder snapshot from HypurrScan…<br>
    <span class="muted" style="font-size:12px;">This refreshes alongside the staking data (hourly).</span>
  </div>

  <section id="cardsSection">
    <div class="grid cards" id="purrCards"></div>
  </section>

  <section>
    <h2>Holder distribution <span class="meta" id="snapshotMeta" style="text-transform:none;letter-spacing:0;"></span></h2>
    <div class="panel" id="purrBuckets"></div>
    <div class="meta" id="purrNote" style="margin-top:8px;font-size:12px;"></div>
  </section>

  <section>
    <h2>Holders <a class="download" href="/api/export/purr-holders.csv" title="Download all PURR holders as CSV">Download CSV</a></h2>
    <div class="panel">
      <div class="filter">
        <label>Min PURR
          <input type="number" id="minPurr" value="0" min="0" step="1" />
        </label>
        <label>Max PURR
          <input type="number" id="maxPurr" placeholder="(none)" min="0" step="1" />
        </label>
        <label>Sort
          <select id="sort">
            <option value="balance_desc">Balance (desc)</option>
            <option value="balance_asc">Balance (asc)</option>
          </select>
        </label>
        <label>Per page
          <select id="limit">
            <option>25</option><option selected>50</option><option>100</option><option>250</option>
          </select>
        </label>
        <button id="applyFilter">Apply</button>
        <button id="resetFilter" class="secondary">Reset</button>
        <div style="flex:1"></div>
        <div class="meta" id="holderCount">—</div>
      </div>
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Address</th>
            <th class="num">PURR</th>
            <th class="num">Share</th>
          </tr>
        </thead>
        <tbody id="holderBody"></tbody>
      </table>
      <div class="pager">
        <button id="prevPage" class="secondary">‹ Prev</button>
        <button id="nextPage" class="secondary">Next ›</button>
        <span id="pageInfo"></span>
      </div>
    </div>
  </section>
</main>

<div id="toast"></div>

<script>
const fmt = (n, d = 2) => n == null ? "—" : Number(n).toLocaleString(undefined, { maximumFractionDigits: d });
const fmtInt = (n) => fmt(n, 0);
const short = (a) => a.slice(0, 6) + "…" + a.slice(-4);
const fmtCompact = (n) => {
  n = Number(n); const a = Math.abs(n);
  if (a >= 1e9) return (n / 1e9).toFixed(a >= 1e10 ? 0 : 1) + "B";
  if (a >= 1e6) return (n / 1e6).toFixed(a >= 1e7 ? 0 : 1) + "M";
  if (a >= 1e3) return (n / 1e3).toFixed(a >= 1e4 ? 0 : 1) + "k";
  return String(Math.round(n));
};
const ago = (ms) => {
  if (!ms) return "—";
  const s = (Date.now() - ms) / 1000;
  if (s < 60) return `${s|0}s ago`;
  if (s < 3600) return `${(s/60)|0}m ago`;
  if (s < 86400) return `${(s/3600)|0}h ago`;
  return `${(s/86400)|0}d ago`;
};
function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(window._toastT);
  window._toastT = setTimeout(() => t.classList.remove("show"), 2500);
}

let page = { offset: 0, limit: 50, total: 0 };
let circulating = 0;  // total PURR held excl. burn/system — used for share %
let emptyPollT = null;

function setLoadingState(loading, label) {
  document.getElementById("emptyState").style.display = loading ? "block" : "none";
  document.querySelectorAll("main > section").forEach(s => { s.style.display = loading ? "none" : ""; });
  document.getElementById("lastRefresh").textContent = label;
  if (loading && !emptyPollT) emptyPollT = setInterval(loadAll, 5000);
  if (!loading && emptyPollT) { clearInterval(emptyPollT); emptyPollT = null; }
}

async function loadStats() {
  let s;
  try {
    const r = await fetch("/api/purr-stats");
    if (!r.ok) throw new Error("HTTP " + r.status);
    s = await r.json();
  } catch (e) {
    setLoadingState(true, "reconnecting…");
    return null;
  }
  if (s.empty) {
    setLoadingState(true, "loading…");
    return null;
  }
  setLoadingState(false, "Updated " + ago(s.last_update_ms));
  circulating = s.total_purr || 0;

  const top10 = (s.top || []).reduce((a, h) => a + h.purr, 0);
  const topPct = circulating ? (top10 / circulating * 100) : 0;
  const cards = [
    { label: "PURR holders", value: fmtInt(s.n_holders) },
    { label: "PURR held", value: fmtCompact(circulating), sub: "excl. burn/system" },
    { label: "Top 10 hold", value: topPct.toFixed(1) + "%" },
    { label: "Largest holder", value: s.top[0] ? fmtCompact(s.top[0].purr) + " PURR" : "—" },
  ];
  document.getElementById("purrCards").innerHTML = cards.map(c => `
    <div class="card">
      <div class="label">${c.label}</div>
      <div class="value">${c.value}</div>
      ${c.sub ? `<div class="sub">${c.sub}</div>` : ""}
    </div>
  `).join("");

  const maxN = Math.max(...s.buckets.map(b => b.n_holders), 1);
  document.getElementById("purrBuckets").innerHTML = s.buckets.map(b => `
    <div class="bar-row">
      <div>${b.label} PURR</div>
      <div class="bar"><div class="bar-fill" style="width:${(b.n_holders / maxN * 100).toFixed(1)}%"></div></div>
      <div class="num">${fmtInt(b.n_holders)} holders</div>
      <div class="num muted">${fmtCompact(b.purr)} PURR</div>
    </div>
  `).join("");

  const note = document.getElementById("purrNote");
  if (s.excluded && s.excluded.length) {
    const exTotal = s.excluded.reduce((a, h) => a + h.purr, 0);
    const n = s.excluded.length;
    note.textContent =
      `Distribution excludes ${n} burn/system address${n > 1 ? "es" : ""} holding ${fmtCompact(exTotal)} PURR (e.g. burn 0xff…ff); they still appear in the holder list below, tagged.`;
  } else {
    note.textContent = "";
  }
  document.getElementById("snapshotMeta").textContent =
    s.last_update_ms ? "spot token · HypurrScan snapshot " + ago(s.last_update_ms) : "spot token · HypurrScan";
  return s;
}

async function loadHolders() {
  const min = document.getElementById("minPurr").value || 0;
  const maxRaw = document.getElementById("maxPurr").value;
  const sort = document.getElementById("sort").value;
  page.limit = parseInt(document.getElementById("limit").value, 10);
  const params = new URLSearchParams({ min_purr: min, sort, limit: page.limit, offset: page.offset });
  if (maxRaw) params.set("max_purr", maxRaw);
  const r = await fetch("/api/purr-holders?" + params);
  const j = await r.json();
  page.total = j.total;
  document.getElementById("holderCount").textContent = `${fmtInt(j.total)} holders match`;
  document.getElementById("holderBody").innerHTML = j.results.map((h, i) => {
    const pct = (!h.is_system && circulating) ? (h.purr / circulating * 100) : null;
    const tag = h.is_system ? ' <span class="pill warn">burn/system</span>' : "";
    return `
    <tr>
      <td class="muted">${page.offset + i + 1}</td>
      <td><span class="addr" data-addr="${h.address}" title="Click to copy">${h.address}</span>${tag}</td>
      <td class="num">${fmt(h.purr, 5)}</td>
      <td class="num muted">${pct == null ? "—" : pct.toFixed(2) + "%"}</td>
    </tr>`;
  }).join("") || `<tr><td colspan="4" class="empty">No holders match.</td></tr>`;
  const last = Math.min(page.offset + page.limit, page.total);
  document.getElementById("pageInfo").textContent =
    page.total ? `${page.offset + 1}–${last} of ${fmtInt(page.total)}` : "";
}

async function loadAll() {
  const s = await loadStats();
  if (s) {
    await loadHolders().catch(e => console.warn("holders load failed", e));
  }
}

document.addEventListener("click", async (e) => {
  const el = e.target.closest(".addr");
  if (!el) return;
  const addr = el.dataset.addr || el.textContent.trim();
  try {
    await navigator.clipboard.writeText(addr);
    toast("Copied " + short(addr));
  } catch {
    toast("Copy failed — your browser blocked it");
  }
});

document.getElementById("applyFilter").addEventListener("click", () => { page.offset = 0; loadHolders(); });
document.getElementById("resetFilter").addEventListener("click", () => {
  document.getElementById("minPurr").value = 0;
  document.getElementById("maxPurr").value = "";
  document.getElementById("sort").value = "balance_desc";
  page.offset = 0; loadHolders();
});
document.getElementById("prevPage").addEventListener("click", () => {
  page.offset = Math.max(0, page.offset - page.limit); loadHolders();
});
document.getElementById("nextPage").addEventListener("click", () => {
  if (page.offset + page.limit < page.total) { page.offset += page.limit; loadHolders(); }
});

loadAll();
</script>
</body>
</html>
